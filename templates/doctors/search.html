{% extends "account/base.html" %}

{% block title %}Search Doctors - Dr. Sheba{% endblock %}

{% block content %}
<div class="w-full max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Search Results</h1>
    <div id="search-results" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {% include 'doctors/partials/list.html' %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // AJAX search functionality
    const searchForm = document.querySelector('form');
    if (searchForm) {
        searchForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('{% url "doctors:search" %}?' + new URLSearchParams(formData), {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(response => response.text())
            .then(html => {
                document.getElementById('search-results').innerHTML = html;
            });
        });
    }
</script>
{% endblock %}
