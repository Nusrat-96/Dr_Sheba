{% extends "account/base.html" %}

{% block title %}Login - Dr. Sheba{% endblock %}

{% block content %}
<div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg p-8">
        <!-- Logo/Brand -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Dr. Sheba</h1>
            <p class="text-gray-500 mt-1">Your Health Partner</p>
        </div>

        <!-- Login Form -->
        <form method="post" action="{% url 'account_login' %}">
            {% csrf_token %}

            <!-- Email Field -->
            <div class="mb-5">
                <label for="id_login" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                <input type="email" name="login" id="id_login" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="you@example.com">
            </div>

            <!-- Password Field -->
            <div class="mb-5">
                <label for="id_password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" name="password" id="id_password" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="Enter your password">
            </div>

            <!-- Remember & Forgot -->
            <div class="flex items-center justify-between mb-6">
                <label class="flex items-center">
                    <input type="checkbox" name="remember" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                    <span class="ml-2 text-sm text-gray-600">Remember me</span>
                </label>
                <a href="{% url 'account_reset_password' %}" class="text-sm text-blue-600 hover:text-blue-800">Forgot password?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-semibold hover:bg-blue-700 transition duration-200">
                Sign In
            </button>
        </form>

        <!-- Register Links -->
        <div class="mt-6 pt-6 border-t border-gray-200 text-center">
            <p class="text-gray-500 text-sm">Don't have an account?</p>
            <div class="mt-4 flex flex-col sm:flex-row gap-3 justify-center">
                <a href="{% url 'register_choose' %}" class="inline-flex justify-center items-center px-4 py-2 bg-blue-50 text-blue-600 rounded-lg font-medium hover:bg-blue-100 transition">
                    Create Account
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
