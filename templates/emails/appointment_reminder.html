<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #f39c12; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }
        .header h1 { margin: 0; font-size: 24px; }
        .content { background: #fff9e6; padding: 30px; border-radius: 0 0 10px 10px; }
        .detail-row { margin: 15px 0; padding: 10px; background: white; border-radius: 5px; border-left: 4px solid #f39c12; }
        .detail-label { font-weight: bold; color: #2c3e50; }
        .detail-value { color: #555; }
        .footer { text-align: center; padding: 20px; color: #7f8c8d; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Appointment Reminder</h1>
        </div>
        <div class="content">
            <p>Dear <strong>{{ patient_name }}</strong>,</p>
            <p>This is a friendly reminder about your upcoming appointment <strong>tomorrow</strong>.</p>

            <div class="detail-row">
                <span class="detail-label">Doctor:</span>
                <span class="detail-value">{{ doctor_name }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Date:</span>
                <span class="detail-value">{{ date }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Time:</span>
                <span class="detail-value">{{ start_time }} - {{ end_time }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Clinic:</span>
                <span class="detail-value">{{ clinic_name }}</span>
            </div>

            <p style="margin-top: 20px;"><strong>Please remember to arrive 15 minutes early.</strong></p>
        </div>
        <div class="footer">
            <p>See you soon!</p>
        </div>
    </div>
</body>
</html>
