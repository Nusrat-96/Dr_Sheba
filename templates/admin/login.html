{% extends "account/base.html" %}

{% block title %}Admin Login - Dr. Sheba{% endblock %}

{% block content %}
<div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg p-8">
        <!-- Logo/Brand -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-600">Dr. Sheba</h1>
            <p class="text-gray-500 mt-1">Admin Panel</p>
        </div>

        {% if form.errors %}
        <div class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg">
            <p class="text-red-600 text-sm">Invalid credentials. Please try again.</p>
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="post" action="{{ app_path }}">
            {% csrf_token %}

            <!-- Username Field -->
            <div class="mb-5">
                <label for="id_username" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                <input type="text" name="username" id="id_username" required autofocus
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="Enter your username">
            </div>

            <!-- Password Field -->
            <div class="mb-5">
                <label for="id_password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" name="password" id="id_password" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="Enter your password">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-semibold hover:bg-blue-700 transition duration-200">
                Sign In
            </button>

            <input type="hidden" name="next" value="{{ next }}">
        </form>

        <!-- Back to Site -->
        <div class="mt-6 pt-6 border-t border-gray-200 text-center">
            <a href="{% url 'home' %}" class="inline-flex items-center text-sm text-gray-500 hover:text-blue-600 transition">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Site
            </a>
        </div>
    </div>
</div>
{% endblock %}
